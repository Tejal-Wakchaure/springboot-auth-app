spring:
  application:
    name:
      auth

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: true

  frontend:
    local:
      url: ${FRONTEND_LOCAL_URL}

    url: ${FRONTEND_URL}

jwt:
  secret: ${KEY}
  expiration: ${EXP_TIME}

server:
  port: ${PORT:8080}

resend:
  api-key: ${RESEND_API_KEY}

springdoc:
  swagger-ui:
    enabled: false

  api-docs:
    enabled: false